<html>

  <link rel="stylesheet" href="styles/style.css"/>
  <title>Login page</title>
</head>
<body>

<script>
function irParaRegistro() {
  window.location.href = "Registre.html";
}
</script>

    <div class="linha"></div>
    <input type="text" placeholder="Digite seu nome">

    <span class="senha">Esqueceu sua senhe e deseja alterar? Clique em: <a href="esqueci.html" class="esqueci">Esqueci a senha</a></span>
    <button class="btn-entrar">Entrar</button>
    <button onclick="irParaRegistro()" class="btn-registrar">Registrar</button>
    
  </div>
</body>
</html>
